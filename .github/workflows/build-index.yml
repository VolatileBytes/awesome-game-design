name: Build GDD Index

on:
  push:
    branches: [main]
    paths:
      - 'gdd/*/GDD.md'
      - '.github/workflows/build-index.yml'
      - '.github/scripts/build-index.mjs'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm install --no-save js-yaml@4

      - run: node .github/scripts/build-index.mjs

      - name: Commit and push if changed
        run: |
          if [[ -n "$(git status --porcelain gdd/index.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add gdd/index.json
            git commit -m "chore: regenerate gdd/index.json [skip ci]"
            git push
          else
            echo "index.json unchanged"
          fi
